<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>🌱 Plant Disease Prediction System</h1>
    </header>

    <section>
        <!-- Upload Form -->
        <form id="uploadForm" enctype="multipart/form-data">
            <label for="file">Upload Plant Leaf Image:</label>
            <input type="file" id="file" name="file" accept="image/*" required>
            <button type="submit" class="animated-btn">Predict</button>
        </form>
        <p id="result"></p>

        <!-- Card Creation Section -->
        <button id="createCardBtn" class="animated-btn">Create Card</button>
        <div id="cardContainer" class="card-container"></div>
    </section>

    <!-- Main JS file using ES6 Modules -->
    <script type="module" src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
